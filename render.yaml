services:
  - type: web
    name: academy-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PRODUCTION
        value: "true"
      - key: SECRET_KEY
        generateValue: true
