# Cloud Build configuration for Hrishi Academy Dashboard
# Explicitly uses Dockerfile - no buildpacks

steps:
  # Step 0: Build Docker image
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --no-cache
      - -t
      - gcr.io/$PROJECT_ID/academy-dashboard:latest
      - -t
      - gcr.io/$PROJECT_ID/academy-dashboard:$COMMIT_SHA
      - -f
      - ./Dockerfile
      - .
    id: BUILD

  # Step 1: Push to Container Registry  
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/academy-dashboard
    id: PUSH

  # Step 2: Deploy to Cloud Run
  - name: gcr.io/cloud-builders/gke-deploy
    args:
      - run
      - --image=gcr.io/$PROJECT_ID/academy-dashboard:latest
      - --service=academy-dashboard
      - --region=us-central1

images:
  - gcr.io/$PROJECT_ID/academy-dashboard:latest
  - gcr.io/$PROJECT_ID/academy-dashboard:$COMMIT_SHA

timeout: 1800s
