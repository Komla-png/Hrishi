steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/academy-dashboard:latest', '.']

  # Push the Docker image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/academy-dashboard:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/run'
    args:
      - deploy
      - academy-dashboard
      - --image=gcr.io/$PROJECT_ID/academy-dashboard:latest
      - --region=us-central1
      - --platform=managed
      - --allow-unauthenticated

images:
  - 'gcr.io/$PROJECT_ID/academy-dashboard:latest'

timeout: '1800s'
