steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/academy-dashboard', '.']

  # Push the Docker image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/academy-dashboard']

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gke-deploy'
    args:
      - run
      - --filename=.
      - --image=gcr.io/$PROJECT_ID/academy-dashboard
      - --location=us-central1
      - --output=/workspace/deploy
  
  - name: 'gcr.io/cloud-builders/gke-deploy'
    args:
      - replace
      - --filename=/workspace/deploy
      - --image=gcr.io/$PROJECT_ID/academy-dashboard
      - --location=us-central1

images:
  - 'gcr.io/$PROJECT_ID/academy-dashboard'

timeout: '3600s'
