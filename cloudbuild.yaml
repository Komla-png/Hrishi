options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

steps:
  # Build the Docker image using explicit Dockerfile
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/academy-dashboard:latest'
      - '-f'
      - 'Dockerfile'
      - '.'
    timeout: '900s'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/academy-dashboard:latest'
    timeout: '900s'

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gke-deploy'
    id: 'deploy'
    args:
      - 'run'
      - '--image=gcr.io/$PROJECT_ID/academy-dashboard:latest'
      - '--service=academy-dashboard'
      - '--region=us-central1'
    timeout: '900s'

images:
  - 'gcr.io/$PROJECT_ID/academy-dashboard:latest'

timeout: '3000s'
