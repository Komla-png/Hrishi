<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Academy Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

        :root {
            --primary-start: #3b82f6;
            --primary-end: #2563eb;
            --page-bg: #eef3fb;
            --text-main: #f8fafc;
            --text-muted: #dbeafe;
            --input-border: rgba(255,255,255,0.6);
            --card-bg: transparent;
            --card-border: transparent;
            --error-bg: #fff1f1;
            --error-border: #ffc9c9;
            --error-text: #d62f2f;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: "Poppins", "Segoe UI", sans-serif;
            margin: 0;
            min-height: 100vh;
            background: var(--page-bg);
            color: var(--text-main);
        }

        .hero-layout {
            min-height: 100vh;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            isolation: isolate;
        }

        .hero-layout::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(155deg, rgba(2,6,23,0.35) 12%, rgba(2,6,23,0.12) 52%, rgba(30,64,175,0.28) 100%);
            z-index: 1;
        }

        .brand-overlay {
            position: absolute;
            z-index: 2;
            left: clamp(1.2rem, 4vw, 3.2rem);
            top: clamp(1.2rem, 4vw, 2rem);
            right: clamp(1.2rem, 4vw, 3.2rem);
            color: #eff6ff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.9rem;
        }

        .brand-overlay h1 {
            margin: 0;
            font-size: clamp(1.1rem, 2vw, 1.55rem);
            font-weight: 700;
            letter-spacing: 0.02em;
            text-wrap: balance;
        }

        .upload-cta {
            margin-top: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.55rem;
            border: 1px solid rgba(255,255,255,0.42);
            border-radius: 999px;
            padding: 0.55rem 1rem;
            font-size: 0.82rem;
            font-weight: 500;
            color: #e2e8f0;
            background: rgba(15, 23, 42, 0.38);
            backdrop-filter: blur(6px);
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        .upload-cta:hover {
            transform: translateY(-1px);
            background: rgba(15, 23, 42, 0.56);
        }

        .upload-cta input {
            display: none;
        }

        .form-panel {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 540px;
            padding: clamp(1rem, 4vw, 2rem);
            animation: fadeUp 0.95s ease both;
        }

        .login-card {
            width: min(460px, 100%);
            margin: 0 auto;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: clamp(1.4rem, 3vw, 2.3rem);
            box-shadow: none;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
        }

        .login-title {
            margin: 0 0 1.35rem;
            color: var(--text-main);
            font-size: clamp(1.55rem, 1.8vw, 2rem);
            font-weight: 700;
            text-align: center;
        }

        .error {
            margin-bottom: 1rem;
            background: var(--error-bg);
            color: var(--error-text);
            border: 1px solid var(--error-border);
            border-radius: 12px;
            padding: 0.72rem 0.85rem;
            font-size: 0.92rem;
            text-align: center;
        }

        .form-group {
            margin-bottom: 0.95rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: #e2e8f0;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .input-field {
            width: 100%;
            border: 1px solid var(--input-border);
            border-radius: 12px;
            padding: 0.82rem 0.95rem;
            background: rgba(255,255,255,0.2);
            color: #f8fafc;
            font-size: 0.95rem;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
        }

        .input-field::placeholder {
            color: rgba(226,232,240,0.85);
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary-start);
            box-shadow: 0 0 0 4px rgba(59,130,246,0.2);
            transform: translateY(-1px);
        }

        .remember-wrap {
            margin: 0.55rem 0 1.05rem;
            display: flex;
            align-items: center;
            gap: 0.55rem;
            color: var(--text-muted);
            font-size: 0.88rem;
            font-weight: 500;
        }

        .remember-wrap input[type="checkbox"] {
            inline-size: 1rem;
            block-size: 1rem;
            accent-color: var(--primary-start);
            cursor: pointer;
        }

        .login-button {
            width: 100%;
            border: 0;
            border-radius: 12px;
            padding: 0.88rem 1rem;
            color: #ffffff;
            font-size: 0.98rem;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(115deg, var(--primary-start), var(--primary-end));
            background-size: 180% 180%;
            box-shadow: 0 10px 24px rgba(37, 99, 235, 0.36);
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-position 0.26s ease;
        }

        .login-button:hover {
            transform: translateY(-2px);
            background-position: 100% 50%;
            box-shadow: 0 15px 28px rgba(37, 99, 235, 0.42);
        }

        .login-button:active {
            transform: translateY(0);
        }

        @media (max-width: 1024px) {
            .form-panel {
                max-width: 100%;
            }
        }

        @media (max-width: 560px) {
            .brand-overlay {
                flex-direction: column;
                align-items: flex-start;
            }

            .brand-overlay h1 {
                font-size: 1rem;
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
    <link rel="stylesheet" href="/static/unified-theme.css">
</head>
<body>
<script>
// Load theme preference from localStorage
function loadThemePreference() {
    // Always dark theme
}
loadThemePreference();
</script>
    <div class="hero-layout" id="visualPanel" style="--bg-image: url('https://images.unsplash.com/photo-1532453288672-3a27e9be9efd?auto=format&fit=crop&w=1800&q=80');">
        <div class="brand-overlay">
            <h1>HRISHIKESH DASHBOARD</h1>
            <label class="upload-cta" for="bgUploader">
                Image
                <input type="file" id="bgUploader" accept="image/*">
            </label>
        </div>

        <section class="form-panel">
            <div class="login-card">
                <h2 class="login-title"></h2>

                {% if error %}
                <div class="error">{{ error }}</div>
                {% endif %}

                <form method="POST" autocomplete="on">
                    <div class="form-group">
                        <label class="form-label" for="username">Username</label>
                        <input class="input-field" type="text" id="username" name="username" required autofocus>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <input class="input-field" type="password" id="password" name="password" required>
                    </div>

                    <label class="remember-wrap" for="remember_me">
                        <input type="checkbox" name="remember_me" id="remember_me">
                        Remember Me
                    </label>

                    <button class="login-button" type="submit">Login</button>
                </form>
            </div>
        </section>
    </div>

<script>
(function () {
    const uploader = document.getElementById('bgUploader');
    const panel = document.getElementById('visualPanel');
    const storageKey = 'customLoginBackground';

    // Restore the last selected local image in this browser.
    const savedImage = localStorage.getItem(storageKey);
    if (savedImage) {
        panel.style.setProperty('--bg-image', `url('${savedImage}')`);
    }

    uploader.addEventListener('change', function (event) {
        const file = event.target.files && event.target.files[0];
        if (!file) {
            return;
        }

        const reader = new FileReader();
        reader.onload = function (loadEvent) {
            const result = loadEvent.target && loadEvent.target.result;
            if (typeof result === 'string') {
                panel.style.setProperty('--bg-image', `url('${result}')`);
                localStorage.setItem(storageKey, result);
            }
        };
        reader.readAsDataURL(file);
    });
})();
</script>
</body>
</html>
